    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d1b15;
            color: #e2e8f0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .rpg-font {
            font-family: 'Cinzel', serif;
            letter-spacing: 0.02em;
        }
        .bg-forest-dark { background-color: #0d1b15; }
        .bg-forest-green { background-color: #1b4332; }
        .text-gold { color: #ffb703; }
        .border-gold { border-color: #ffb703; }
        .progress-green { background: linear-gradient(90deg, #2d6a4f 0%, #52b788 100%); }
        .progress-blue { background: linear-gradient(90deg, #1d4ed8 0%, #60a5fa 100%); }
        .progress-gold { background: linear-gradient(90deg, #b45309 0%, #fbbf24 100%); }
        
        .rpg-panel {
            border: 2px solid #2d3a35;
            position: relative;
            background: #162a21;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .rpg-panel::before {
            content: '';
            position: absolute;
            top: 2px; left: 2px; right: 2px; bottom: 2px;
            border: 1px solid rgba(255, 183, 3, 0.1);
            pointer-events: none;
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0d1b15; }
        ::-webkit-scrollbar-thumb { background: #1b4332; border-radius: 10px; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        forest: {
                            dark: '#0d1b15',
                            green: '#1b4332',
                        },
                        gold: '#ffb703',
                        slate: '#334155',
                    }
                }
            }
        }
    </script>

        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js').then(registration => {

            console.log('SW registration failed: ', registrationError);
          });
        });
      }
